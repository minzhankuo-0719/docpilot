apiVersion: zeabur.com/v1
kind: ZeaburProjectConfig
name: docpilot
spec:
  services:
    - name: docpilot-mcp
      template: DOCKERFILE
      spec:
        source:
          dockerfile: Dockerfile
        ports:
          - id: http
            port: 8000
            type: HTTP
        env:
          - key: PORT
            value: "8000"
          - key: HOST
            value: "0.0.0.0"
